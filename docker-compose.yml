services:
  shopping_list_app:
    image: ghcr.io/${GITHUB_USER_LOWER}/shopping-list-phoenix/shopping_list:latest
    container_name: shopping_list_prod
    restart: unless-stopped
    environment:
      - PHX_SERVER=true
      - PHX_HOST=100.68.56.93
      - PHX_URL_SCHEME=http
      - PHX_PORT=4000
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - DATABASE_PATH=/app/data/shopping_list_prod.db
    ports:
      - "4000:4000"
    volumes:
      - shopping_list_data:/app/data
  watchtower:
    image: containrrr/watchtower
    container_name: deployment_watchtower
    restart: unless-stopped
    command: shopping_list_prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-300}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_TIMEOUT=30s
      - DOCKER_API_VERSION=1.40

volumes:
  shopping_list_data:
